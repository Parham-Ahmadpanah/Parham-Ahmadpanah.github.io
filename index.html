<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مشاور آرایشی هوشمند</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: "Vazirmatn", sans-serif;
      background-color: #f9f3f3;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      direction: rtl;
    }
    h1 {
      color: #d63384;
    }
    input, button {
      font-size: 1rem;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 1rem;
    }
    button {
      background-color: #d63384;
      color: white;
      cursor: pointer;
      margin-right: 1rem;
    }
    #answer {
      margin-top: 2rem;
      background: #fff;
      padding: 1.5rem;
      border-radius: 12px;
      max-width: 600px;
      line-height: 1.9;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      white-space: pre-wrap;
    }
    strong {
      font-weight: bold;
      color: #b4005a;
    }
    em {
      font-style: italic;
      color: #555;
    }
    a {
      color: #d63384;
      text-decoration: none;
      font-weight: bold;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <h1>🤖 مشاور زیبایی هوشمند</h1>

  <input id="question" placeholder="سوال خود را وارد کنید..." size="50" />
  <button onclick="askConsultant()">بپرس</button>

  <div id="answer">👋 لطفاً سوال خود را وارد کنید.</div>

  <script>
    async function askConsultant() {
      const question = document.getElementById("question").value.trim();
      const answerEl = document.getElementById("answer");

      if (!question) {
        answerEl.innerHTML = "❗ لطفاً سوالی وارد کنید.";
        return;
      }

      answerEl.innerHTML = "⏳ در حال پاسخ‌گویی...";

      try {
        const res = await fetch("https://backchatbot-1.onrender.com/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const data = await res.json();
        let raw = data.answer || "❌ پاسخ یافت نشد.";

        // Convert **bold** and *italic* into HTML tags
        raw = raw
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>");

        answerEl.innerHTML = raw;
      } catch (err) {
        console.error("خطا:", err);
        answerEl.innerHTML = "❌ مشکلی در ارتباط با سرور پیش آمد.";
      }
    }
  </script>
</body>
</html>
